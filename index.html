<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        
        <!-- Bootstrap 5 CSS (로드 먼저) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
        <!-- 커스텀 CSS (Bootstrap 다음에 로드 - 우선 적용됨) -->
        <style type="text/css">
            body{
                font-family: Arial, sans-serif;
                margin: 256px 0 0 128px;
                padding: 20px;
                background-color: #070707;
            }
            h1 {
                color: #f8f8f8;
                font-size: 40px;
                margin-bottom: 12px;
            }
            h2 {
                color: #eeeded;
                font-size: 24px;
                margin-bottom: 20px;
                font-weight: lighter;
            }
        </style>
    </head>

    <body>
        <div class="cover">
            <h1>글로벌미디어학부22 최봄이</h1>
            <h2>팀 빌딩을 위한 자기소개</h2>
        </div>

        <div class="background" style="margin-top: 600px;">
            <h1 style="font-size: 48px;">Background</h1>
        </div>

        <div class="list" style="margin-top: 120px; margin-left:128px">
            <h1>1. 플레이버</h1>
            <h2>서울 대학의 댄스 동아리들이 다인원퍼포먼스를 하는 유니온에서 20여명의 무대를 구성한 경험이 있습니다.</h2>
            <h2>저의.... 통솔력? 리더십? 예술적?음 뭐 아무튼 그런거를 보여줄 수 있는 경험인 거 같아 넣어봤습니다 ^.^</h2>
            <a href="https://youtu.be/l7LCNBKlTTI?si=fnbthRK_pfziQHO0" class="btn btn-primary btn-lg" style="margin-top: 20px; background: linear-gradient(to right, #fefcff, #e4c5ff); border: none; color:#070707" target="_blank" rel="noopener noreferrer">유튜브 보러가기 <i class="bi bi-arrow-right"></i></a>
        </div>

        <div style="width: 60%; margin: 0 auto; margin-top: 120px;">
            <div id="carouselExampleIndicators" class="carousel slide">

                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="4" aria-label="Slide 5"></button>
                </div>

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="images/플버사진1.png" class="d-block w-100" alt="플레이버 사진 1">
                    </div>
                    <div class="carousel-item">
                        <img src="images/플버사진2.png" class="d-block w-100" alt="플레이버 사진 2">
                    </div>
                    <div class="carousel-item">
                        <img src="images/플버사진3.png" class="d-block w-100" alt="플레이버 사진 3">
                    </div>
                    <div class="carousel-item">
                        <img src="images/플버사진4.png" class="d-block w-100" alt="플레이버 사진 4">
                    </div>
                    <div class="carousel-item">
                        <img src="images/플버사진5.png" class="d-block w-100" alt="플레이버 사진 5">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>

        

        <!-- Bootstrap 5 JS Bundle (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
